name: Deploy to Databricks Apps (prod)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      # app.yaml에 Lakebase 접속 정보 주입 (placeholder → 실제 값)
      - name: Patch app.yaml with Lakebase credentials
        run: |
          sed -i 's|your-lakebase-host|${{ secrets.DB_HOST }}|g' frontend/app.yaml
          sed -i 's|your-lakebase-user|${{ secrets.DB_USER }}|g' frontend/app.yaml
          sed -i 's|your-lakebase-password|${{ secrets.DB_PASSWORD }}|g' frontend/app.yaml

      # 워크스페이스에 소스코드 업로드
      - name: Sync source to Databricks Workspace
        run: databricks workspace import-dir ./frontend "/Workspace/Users/${{ secrets.DATABRICKS_USER }}/apps/q_bank" --overwrite

      # Databricks Apps 배포
      - name: Deploy Databricks App
        run: databricks apps deploy "${{ secrets.DATABRICKS_APP_NAME }}" --source-code-path "/Workspace/Users/${{ secrets.DATABRICKS_USER }}/apps/q_bank"
