services:
  postgres:
    image: postgres:16
    container_name: q_bank_db
    environment:
      POSTGRES_DB: q_bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
