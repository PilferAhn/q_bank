# Databricks App 설정
# prod DB: Databricks Lakebase (managed PostgreSQL)
# DB 접속 정보는 Databricks App 환경변수로 주입 (UI 또는 CI/CD)
command: ["streamlit", "run", "app.py", "--server.port", "8000"]

env:
  - name: USER_ID_SOURCE
    value: "databricks"           # Databricks 로그인 계정을 응시자 ID로 사용
  - name: DB_HOST
    value: "your-lakebase-host"   # CI/CD에서 치환됨
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: "q_bank"
  - name: DB_USER
    value: "your-lakebase-user"   # CI/CD에서 치환됨
